<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You</title>
    <style>
        :root {
            --pink: #ff4d6d;
            --bg: #fff0f3;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg);
            text-align: center;
            overflow-x: hidden;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            padding: 20px;
        }
        .gif-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            min-height: 250px;
        }
        #typing-text {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--pink);
            margin-bottom: 30px;
            min-height: 1.5em;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .heart-with-a {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            line-height: 1;
        }
        .heart-with-a .inner-a {
            position: absolute;
            font-size: 0.9rem;
            color: white;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-weight: bold;
            margin-top: -4px;
        }
        .main-btn {
            background: var(--pink);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
            position: relative;
            z-index: 1000;
        }
        #scroll-hint {
            display: none;
            font-size: 1.2rem;
            color: var(--pink);
            font-weight: bold;
            margin-top: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
        .heart-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
        .heart {
            position: absolute;
            bottom: -10%;
            font-size: 2rem;
            animation: floatUp 4s linear forwards;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .heart-char {
            position: absolute;
            font-size: 0.8rem;
            color: white;
            font-weight: bold;
            font-family: Arial, sans-serif;
            transform: translateY(-2px);
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
        #hidden-content {
            display: none;
            padding: 50px 20px 100px 20px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin: 40px auto;
            max-width: 1200px;
        }
        .card {
            background: white;
            padding: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            width: 320px;
            border-radius: 10px;
        }
        .card img { 
            width: 100%; 
            height: 350px; 
            object-fit: cover; 
            border-radius: 5px; 
        }
        #countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .time-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            min-width: 85px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .time-num { font-size: 2.5rem; font-weight: bold; color: var(--pink); display: block; }
        .time-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .header-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heart-box"></div>

    <section class="hero">
        <div class="gif-container" id="main-gif-box">
            <div class="tenor-gif-embed" data-postid="10627323285930200709" data-share-method="host" data-aspect-ratio="0.901639" data-width="100%">
                <a href="https://tenor.com/view/sorry-gif-10627323285930200709">Sorry Sticker</a>
            </div>
            <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
        </div>

        <div id="typing-text"></div>
        <button id="mainBtn" class="main-btn" onclick="revealSurprise()">Click if you still love me</button>
        <div id="scroll-hint">YAYAYAYYAYAYAYY! Scroll down to see your surprises... ↓</div>
    </section>

    <div id="hidden-content">
        <div class="header-container">
            <h2 style="color: var(--pink); font-size: 2.5rem; margin: 0;">For My Favorite Person</h2>
            <span class="heart-with-a">❤️<span class="inner-a">A</span></span>
        </div>
        
        <div class="gallery">
            <div class="card">
                <img src="Images/Image1.jpg" alt="Memory 1">
                <p>Every moment with you is a gift ✨</p>
            </div>
            <div class="card">
                <img src="Images/Image2.jpg" alt="Memory 2">
                <p>Better together, always 💖</p>
            </div>
        </div>

        <div style="max-width: 700px; margin: 40px auto;">
            <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/3q6NhHBML1exmXhMiIEHeR?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <h2 style="color: var(--pink); font-size: 2.5rem; margin-top: 60px;">Our Anniversary</h2>
        <div id="countdown">
            <div class="time-box"><span id="days" class="time-num">00</span><span class="time-label">Days</span></div>
            <div class="time-box"><span id="hours" class="time-num">00</span><span class="time-label">Hrs</span></div>
            <div class="time-box"><span id="mins" class="time-num">00</span><span class="time-label">Min</span></div>
            <div class="time-box"><span id="secs" class="time-num">00</span><span class="time-label">Sec</span></div>
        </div>
    </div>

    <script>
        const message = "I'm so incredibly sorry... please forgive me? 🥺";
        let charIndex = 0;
        let typingInterval;

        function type() {
            const typingElement = document.getElementById("typing-text");
            if (typingElement && charIndex < message.length) {
                typingElement.innerHTML += message.charAt(charIndex);
                charIndex++;
                typingInterval = setTimeout(type, 80);
            }
        }
        document.addEventListener('DOMContentLoaded', type);

        function createHeart() {
            const container = document.getElementById("heart-box");
            if (!container) return;
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = `<span style="color: #ff4d6d;">❤️</span><span class="heart-char">A</span>`;
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        function revealSurprise() {
            clearTimeout(typingInterval);

            for(let i = 0; i < 15; i++) {
                setTimeout(createHeart, i * 100);
            }
            setInterval(createHeart, 500);

            document.getElementById("hidden-content").style.display = "block";
            document.getElementById("scroll-hint").style.display = "block";
            document.getElementById("mainBtn").style.display = "none";
            
            document.getElementById("typing-text").innerHTML = `
                YAYAYAYYAYAYAYY! You're the best! 
                <span class="heart-with-a">❤️<span class="inner-a">A</span></span>
            `;

            document.getElementById("main-gif-box").innerHTML = `
                <div class="tenor-gif-embed" data-postid="998738995151584503" data-share-method="host" data-aspect-ratio="1.20219" data-width="100%">
                    <a href="https://tenor.com/view/milk-and-mocha-gif-998738995151584503">Milk And Mocha Sticker</a>
                </div>
            `;
            const script = document.createElement("script");
            script.src = "https://tenor.com/embed.js";
            script.async = true;
            document.body.appendChild(script);
        }

        function updateTimer() {
            const now = new Date();
            let target = new Date(now.getFullYear(), 9, 10); 
            if (now > target) target.setFullYear(now.getFullYear() + 1);
            const diff = target - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("mins").innerText = m.toString().padStart(2, '0');
            document.getElementById("secs").innerText = s.toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
